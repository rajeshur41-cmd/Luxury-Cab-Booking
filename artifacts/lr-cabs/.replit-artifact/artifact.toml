kind = "web"
previewPath = "/"
title = "LR Cabs & Tours and Travels"
version = "1.0.0"
id = "artifacts/lr-cabs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21784

[services.development]
run = "pnpm --filter @workspace/lr-cabs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lr-cabs", "run", "build" ]
publicDir = "artifacts/lr-cabs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21784"
BASE_PATH = "/"
